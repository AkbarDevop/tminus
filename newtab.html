<!DOCTYPE html>
<html lang="en" data-theme="paper" data-font="sans" style="background:#f1efe9">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <script src="src/theme-init.js"></script>
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <main class="stage" id="stage">
    <!-- populated by app.js: logo, fractional-days number, other deadlines, links -->
  </main>

  <button class="gear" id="editBtn" type="button" title="Customize" aria-label="Customize">
    <span class="pen">✎</span><span>Customize</span>
  </button>

  <!-- SETTINGS PANEL -->
  <div class="panel-scrim" id="panelScrim" hidden></div>
  <aside class="panel" id="panel" hidden aria-label="Settings">
    <div class="panel-inner">
      <div class="panel-head">
        <span class="panel-title">CUSTOMIZE</span>
        <button class="del" id="closeBtn" type="button" aria-label="Close settings">✕</button>
      </div>

      <section class="pgroup">
        <h2>Deadlines</h2>
        <p class="hint-text">The featured one is the big number. The rest show smaller underneath.</p>
        <div id="deadlineRows" class="rows"></div>
        <button class="add" id="addDeadline" type="button">+ Add deadline</button>
      </section>

      <section class="pgroup">
        <h2>Quick links</h2>
        <div id="linkRows" class="rows"></div>
        <button class="add" id="addLink" type="button">+ Add link</button>
      </section>

      <section class="pgroup">
        <h2>Look</h2>
        <div class="field"><span>Background</span><div class="swatches" id="themeSwatches"></div></div>
        <div class="field"><span>Font</span><div class="font-chips" id="fontChips"></div></div>
        <label class="field">
          <span>Fraction digits</span>
          <select id="decimalsSelect">
            <option value="3">3</option>
            <option value="6">6</option>
            <option value="9">9</option>
          </select>
        </label>
      </section>

      <section class="pgroup">
        <h2>Optional: age line</h2>
        <label class="field checkbox">
          <input type="checkbox" id="showAgeToggle" />
          <span>Show a faint "alive" age line below the links</span>
        </label>
        <label class="field">
          <span>Date of birth</span>
          <input type="date" id="dobInput" />
        </label>
      </section>

      <div class="panel-foot">
        <button class="danger" id="resetBtn" type="button">Reset everything</button>
        <span class="hint">Changes save automatically</span>
      </div>
    </div>
  </aside>

  <input type="file" id="logoFile" accept="image/png,image/jpeg,image/svg+xml,image/webp,image/gif" hidden />

  <script type="module" src="src/app.js"></script>
</body>
</html>
